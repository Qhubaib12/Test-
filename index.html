<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resume</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f2f2f7;
      --navbar-bg: rgba(255,255,255,0.72);
      --card-bg: rgba(255,255,255,0.85);
      --border: rgba(0,0,0,0.08);
      --text-primary: #1c1c1e;
      --text-secondary: #636366;
      --text-tertiary: #aeaeb2;
      --blue: #007aff;
      --blue-dark: #0062cc;
      --blue-light: rgba(0,122,255,0.12);
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
      --radius: 14px;
      --radius-sm: 10px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: -apple-system, 'SF Pro Text', 'SF Pro Display', 'Inter', sans-serif;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Navbar ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 52px;
      background: var(--navbar-bg);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }

    .nav-title {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text-primary);
    }

    /* iOS-style pill button */
    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--blue);
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.2px;
      padding: 7px 16px;
      border-radius: 980px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.12s ease, box-shadow 0.18s ease;
      box-shadow: 0 2px 8px rgba(0,122,255,0.30);
      -webkit-tap-highlight-color: transparent;
    }

    .download-btn:hover {
      background: var(--blue-dark);
      transform: scale(1.03);
      box-shadow: 0 4px 14px rgba(0,122,255,0.40);
    }

    .download-btn:active {
      transform: scale(0.97);
      box-shadow: 0 1px 4px rgba(0,122,255,0.20);
    }

    .download-btn svg {
      width: 15px;
      height: 15px;
    }

    /* ── Page ── */
    main {
      padding-top: 72px;
      padding-bottom: 48px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    /* Subtle iOS wallpaper-like gradient at top */
    main::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 340px;
      background: linear-gradient(180deg, rgba(0,122,255,0.06) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Card wrapper ── */
    .card {
      position: relative;
      z-index: 1;
      width: calc(100% - 32px);
      max-width: 820px;
      background: var(--card-bg);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      animation: riseUp 0.55s cubic-bezier(0.34,1.28,0.64,1) both;
    }

    @keyframes riseUp {
      from { opacity: 0; transform: translateY(28px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* macOS-style traffic lights inside the card top bar */
    .card-topbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 12px 16px;
      background: rgba(242,242,247,0.6);
      border-bottom: 0.5px solid var(--border);
    }

    .traffic-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .td-red    { background: #ff5f57; box-shadow: 0 0 0 0.5px rgba(255,0,0,0.15); }
    .td-yellow { background: #febc2e; box-shadow: 0 0 0 0.5px rgba(255,160,0,0.15); }
    .td-green  { background: #28c840; box-shadow: 0 0 0 0.5px rgba(0,200,0,0.15); }

    .topbar-label {
      margin-left: 10px;
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    iframe {
      display: block;
      width: 100%;
      height: 82vh;
      border: none;
    }

    /* ── Footer pills row ── */
    .footer-row {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: riseUp 0.55s 0.1s cubic-bezier(0.34,1.28,0.64,1) both;
    }

    .footer-pill {
      background: rgba(255,255,255,0.80);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 0.5px solid var(--border);
      border-radius: 980px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--text-secondary);
      box-shadow: var(--shadow-sm);
    }

    .footer-pill.accent {
      background: var(--blue-light);
      color: var(--blue);
      border-color: rgba(0,122,255,0.15);
    }
  </style>
</head>
<body>

  <!-- Apple-style frosted navbar -->
  <nav>
    <span class="nav-title">Resume</span>
    <a
      class="download-btn"
      href="https://drive.google.com/uc?export=download&id=1g2suNWJEqyAQWUcv2l1hFhAsN6JYGA6q"
      target="_blank"
      rel="noopener noreferrer"
    >
      <!-- SF Symbols-style download arrow -->
      <svg viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M7.5 1.5v8M7.5 9.5l-3-3M7.5 9.5l3-3" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 12.5h11" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Download PDF
    </a>
  </nav>

  <main>
    <!-- Frosted glass card with macOS chrome -->
    <div class="card">
      <div class="card-topbar">
        <span class="traffic-dot td-red"></span>
        <span class="traffic-dot td-yellow"></span>
        <span class="traffic-dot td-green"></span>
        <span class="topbar-label">resume.pdf</span>
      </div>
      <iframe
        src="https://drive.google.com/file/d/1g2suNWJEqyAQWUcv2l1hFhAsN6JYGA6q/preview"
        allow="autoplay"
        title="Resume PDF"
      ></iframe>
    </div>

    <!-- Footer metadata pills -->
    <div class="footer-row">
      <span class="footer-pill accent">PDF Document</span>
      <span class="footer-pill">Google Drive Preview</span>
    </div>
  </main>

</body>
</html>
